{% extends "base.html" %}

{% block title %}Login - Automated Essay Scoring System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg">
            <div class="card-header bg-gradient text-white text-center">
                <h4 class="mb-0">
                    <i class="bi bi-box-arrow-in-right me-2"></i>
                    Login to Your Account
                </h4>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('login') }}" method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">
                            <i class="bi bi-envelope me-1"></i>
                            Email Address
                        </label>
                        <input 
                            type="email" 
                            class="form-control" 
                            id="email" 
                            name="email" 
                            placeholder="Enter your email"
                            required
                        >
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="bi bi-lock me-1"></i>
                            Password
                        </label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password" 
                            name="password" 
                            placeholder="Enter your password"
                            required
                        >
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">
                            Remember me
                        </label>
                    </div>
                    
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-box-arrow-in-right me-2"></i>
                            Login
                        </button>
                    </div>
                    
                    <div class="text-center">
                        <p class="mb-0">
                            Don't have an account? 
                            <a href="{{ url_for('register') }}" class="text-primary text-decoration-none">
                                Register here
                            </a>
                        </p>
                    </div>
                </form>
            </div>
        </div>

        <!-- Features Card -->
        <div class="card mt-4">
            <div class="card-body">
                <h6 class="card-title text-center mb-3">
                    <i class="bi bi-star me-2"></i>
                    Why Use Our AI Essay Scorer?
                </h6>
                <div class="row text-center">
                    <div class="col-4">
                        <i class="bi bi-cpu text-primary fs-4"></i>
                        <p class="small mb-0">ML-Powered</p>
                    </div>
                    <div class="col-4">
                        <i class="bi bi-graph-up text-success fs-4"></i>
                        <p class="small mb-0">Track Progress</p>
                    </div>
                    <div class="col-4">
                        <i class="bi bi-cloud-arrow-up text-info fs-4"></i>
                        <p class="small mb-0">Save Essays</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
